{% extends 'transactions/index.html' %}
{% load crispy_forms_tags %}
{% load static %}

{% block title %}<title>Log Move</title>{% endblock %}



{% block main_content %}
<!--Main Content-->
<main class="tracker-main-content p-4 flex-grow-1">
      <!--Header Section-->
      <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
              <h1 class="text-primary mb-1"><i class="fa-solid fa-bolt"></i>
                  Quick Move
              </h1>
          </div>
      </div>

      <!-- Transaction Form Card (Centered) -->
      <div class="quick-move d-flex align-items-center justify-content-center">
        <div class="card border-0 shadow-sm mb-4 w-100" style="min-width: 250px;">
          <div class="card-body">
            <div class="form-group">
              <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-success mt-3">
                  <i class="bi bi-check-lg me-2"></i>Save
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
</main>
{% endblock %}
