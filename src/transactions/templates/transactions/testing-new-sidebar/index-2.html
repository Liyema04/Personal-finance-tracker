{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Bootstrap-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    
    <!--FontAwesome-->
    <script src="https://kit.fontawesome.com/34fa937ae1.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    
    <!--Font Loading - Fixed Order & Fallbacks -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <!-- Local Font Preload with Error Handling -->
    <link rel="preload" href="{% static 'fonts/WorkSans-Variable.woff2' %}" as="font" type="font/woff2" crossorigin>
    
    <link rel="stylesheet" href="{% static 'css/fonts.css' %}"> 
    {% block title %}<title>Dashboard Sidebar Menu | Dark-Light Mode </title>{% endblock %}

    <!--Sidebar CSS & JS-->
    <link rel="stylesheet" href="{% static 'css/new-sidebar.css' %}">
    <script src="{% static 'js/newSidebar.js' %}"></script>

</head>
<body>
    <!-- Main Content Layout -->
    {% block content %}
        {% block sidebar %}
            <div>
                <h1>Lets Go!</h1>
            </div>
        {% endblock %}
    {% endblock %}
        
    
</body>
</html>
