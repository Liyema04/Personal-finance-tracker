{% for t in transactions %}
<tr>
    <!-- Date -->
    <td data-label="Date">
        <div class="d-flex flex-column">
            <span class="fw-medium">{{ t.date|date:"M d" }}</span>
            <small class="text-muted">{{ t.date|date:"Y" }}</small>
        </div>
    </td>

    <!-- Amount -->
    <td data-label="Amount">
        <span class="fw-bold {% if t.type == 'income' %}text-success{% else %}text-danger{% endif %}">
            {% if t.type == 'income' %}+{% else %}-{% endif %}R{{ t.amount }}
        </span>
    </td>

    <!-- Category -->
    <td data-label="Category">
        <div class="category-icon-text">
            {{ t.get_category_display|default:t.category }}
        </div>
    </td>

    <!-- Description -->
    <td data-label="Description" class="d-none d-md-table-cell">
        <span class="text-muted">{{ t.description|truncatechars:50 }}</span>
    </td>

    <!-- Type -->
    <td data-label="Type">
        <span class="badge {% if t.type == 'income' %}bg-success{% else %}bg-danger{% endif %}">
            <i class="bi {% if t.type == 'income' %}bi-arrow-up-circle{% else %}bi-arrow-down-circle{% endif %} me-1"></i>
            {{ t.type|title }}
        </span>
    </td>

    <!-- Actions -->
    <td class="actions">
        <!-- Mobile: stacked full-width buttons -->
        <div class="d-block d-md-none mb-2">
            <div class="d-grid gap-2">
                <a href="{% url 'detail_transaction' t.id %}" class="btn btn-sm btn-info w-100">
                    <i class="bi bi-eye me-1"></i> View
                </a>
                <a href="{% url 'edit_transaction' t.id %}" class="btn btn-sm btn-outline-primary w-100">
                    <i class="bi bi-pencil-square me-1"></i> Edit
                </a>
                <a href="{% url 'delete_transaction' t.id %}" class="btn btn-sm btn-outline-danger w-100">
                    <i class="bi bi-trash me-1"></i> Delete
                </a>
            </div>
        </div>

        <!-- Desktop: compact icon buttons -->
        <div class="d-none d-md-block">
            <a href="{% url 'detail_transaction' t.id %}" class="btn btn-sm btn-info" title="View Details">
                <i class="bi bi-eye"></i>
            </a>
            <a href="{% url 'edit_transaction' t.id %}" class="btn btn-sm btn-outline-primary" title="Edit">
                <i class="bi bi-pencil-square"></i>
            </a>
            <a href="{% url 'delete_transaction' t.id %}" class="btn btn-sm btn-outline-danger" title="Delete">
                <i class="bi bi-trash"></i>
            </a>
        </div>
    </td>
</tr>
{% endfor %}
