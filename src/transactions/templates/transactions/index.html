{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
        <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
        {% block title %} <title>Dashboard</title> {% endblock %}
    </head>
    <body>
        <!-- Header -->
        <header class="tracker-header bg-white shadow-sm p-3 mb-4">
            <div class="d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <!-- <img src="#" height="40" class="me-3"> -->
                <h1 class="m-0 fs-4 text-primary">Senti<span class="text-secondary">Wise</span></h1>
            </div>
            <div class="d-flex align-items-center">
                <!--Navbar Dropdown-->
                <li class="nav-item dropdown list-unstyled me-3"> <!--removes bullets from list-->
                    <a class="nav-link dropdown-toggle d-flex align-items-center"
                    href="#"
                    id="finDropdown"
                    role="button"
                    data-bs-toggle="dropdown"
                    aria-expended="false">
                    <i class="bi bi-wallet2 me-2"></i>My Money
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="finDropdown">
                    <li>
                        <a class="dropdown-item" href="{% url 'dashboard' %}">
                        <i class="bi bi-cash-stack me-2"></i> Senti Moves
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item" href="{% url 'list_transaction' %}">
                        <i class="bi bi-currency-exchange me-2"></i> Rand Journey
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item" href="{% url 'add_transaction' %}">
                        <i class="bi bi-speedometer2 me-2"></i> Quick Move
                        </a>
                    </li>
                    </ul> 
                </li>
                <!-- Profile Dropdown Menu -->
                <div class="dropdown">
                    <button class="btn btn-light dropdown-toggle" data-bs-toggle="dropdown">
                    <img src="{% static 'images/avatar.jpeg' %}" width="36" class="rounded-circle">
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="#"><i class="bi bi-person me-2"></i>Profile</a></li>
                    <li><a class="dropdown-item" href="{% url 'login' %}"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                    </ul>
                </div> 
            </div>
            </div>
        </header>
        {% block content %}
            <!-- Main Content -->
            {% block sidebar %} 
            <div class="d-flex">
                <!-- Sidebar -->
                <nav class="tracker-sidebar bg-light p-3" style="width: 220px;">
                    <ul class="nav flex-column">
                        <li class="nav-item mb-2">
                        <a class="nav-link active" href="{% url 'dashboard' %}" data-bs-toggle="tooltip" title="Dashboard" alt="dashboard">
                            <i class="bi bi-emoji-smile me-2"></i>Money Mood
                        </a>
                        </li>
                        <li class="nav-item mb-2">
                        <a class="nav-link" href="{% url 'list_transaction' %}" data-bs-toggle="tooltip" title="Track your income and spending">
                            <i class="bi bi-currency-exchange me-2"></i>Rand Journey
                        </a>
                        </li>
                        <!-- More menu items -->
                        <li class="nav-item mb-2">
                        <a class="nav-link" href="{% url 'add_transaction' %}" data-bs-toggle="tooltip" title="Add transactions" alt="add transactions">
                            <i class="bi bi-pen me-2"></i>Log a move
                        </a>
                        </li> 
                    </ul>
                </nav>
            </div>
            {% endblock %}    
        {% endblock %}
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
            <script>
              // Activate Bootstrap tooltips
              const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
              tooltipTriggerList.map(function (tooltipTriggerEl) {
                return new bootstrap.Tooltip(tooltipTriggerEl);
              });

              // Enhance category dropdown
              document.getElementById('categorySelect').addEventListener('change', function() {
              const selectedOption = this.options[this.selectedIndex];
                console.log(`Selected: ${selectedOption.text}`);
              });    
            </script>        
    </body>
</html>
