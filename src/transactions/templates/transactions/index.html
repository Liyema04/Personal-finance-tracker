{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
        {% block title %} <title>Dashboard</title> {% endblock %}
    </head>
    <body>
        {% block content %}
            {% block header %}
            <!-- Header -->
            <header class="tracker-header bg-white shadow-sm p-3 mb-4">
                <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <!-- <img src="#" height="40" class="me-3"> -->
                    <h1 class="m-0 fs-4 text-primary">Senti<span class="text-secondary">Wise</span></h1>
                </div>
                <div class="d-flex align-items-center">
                    <!-- <button class="btn btn-primary me-3">
                    <i class="bi bi-plus-lg me-2"></i>New Transaction
                    </button> -->
                    <div class="dropdown">
                    <button class="btn btn-light dropdown-toggle" data-bs-toggle="dropdown">
                        <img src="{% static 'images/avatar.jpeg' %}" width="36" class="rounded-circle">
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#"><i class="bi bi-person me-2"></i>Profile</a></li>
                        <li><a class="dropdown-item" href="{% url 'login' %}"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                    </ul>
                    </div>
                </div>
                </div>
            </header>
            {% endblock %}
            <!-- Main Content -->
            {% block sidebar %} 
            <div class="d-flex">
                <!-- Sidebar -->
                <nav class="tracker-sidebar bg-light p-3" style="width: 220px;">
                <ul class="nav flex-column">
                    <li class="nav-item mb-2">
                    <a class="nav-link active" href="#">
                        <i class="bi bi-speedometer2 me-2"></i> Dashboard
                    </a>
                    </li>
                    <li class="nav-item mb-2">
                    <a class="nav-link" href="#">
                        <i class="bi bi-cash-stack me-2"></i> Transactions
                    </a>
                    </li>
                    <!-- More menu items -->
                </ul>
                </nav>
            </div>
            {% endblock %}    
        {% endblock %}
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>        
    </body>
</html>
